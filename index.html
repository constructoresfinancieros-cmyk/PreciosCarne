<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRECIO AL DÍA - VZLA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-blue: #0a3d44; /* Azul petróleo de la imagen */
            --header-gradient: linear-gradient(180deg, #0a3d44 0%, #125b64 100%);
            --gold: #c5a059;
            --light-bg: #f4f7f8;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #e0e7e9; 
            margin: 0; 
            padding: 20px;
            display: flex;
            justify-content: center;
            background-image: radial-gradient(#cad5d8 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .app-container { 
            width: 100%;
            max-width: 450px;
            background: #ffffff; 
            border-radius: 35px; 
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            border: 1px solid rgba(255,255,255,0.3);
        }

        header {
            background: var(--header-gradient);
            padding: 40px 20px;
            color: white;
            text-align: center;
            border-bottom: 4px solid var(--gold);
        }

        h1 { margin: 0; font-size: 1.8rem; font-weight: 800; letter-spacing: 2px; }
        .subtitle { font-size: 0.9rem; opacity: 0.8; margin-top: 8px; font-weight: 400; }

        .date-badge {
            display: inline-block;
            background: rgba(255,255,255,0.15);
            padding: 6px 15px;
            border-radius: 12px;
            font-size: 0.8rem;
            margin-top: 15px;
            border: 1px solid rgba(255,255,255,0.3);
        }

        #lista { padding: 20px; background-color: var(--light-bg); }

        .card {
            display: flex;
            align-items: center;
            padding: 18px;
            margin-bottom: 15px;
            border-radius: 20px;
            background: #ffffff;
            box-shadow: 6px 6px 12px #d1d9db, -6px -6px 12px #ffffff;
            border: 1px solid rgba(0,0,0,0.03);
            position: relative;
        }

        .card.best-deal {
            border: 2px solid var(--gold);
            background: linear-gradient(145deg, #ffffff, #f9f4e8);
        }

        .best-deal::after {
            content: "Mejor Opción 🚀";
            position: absolute;
            top: -12px;
            right: 20px;
            background: #2e7d32;
            color: white;
            font-size: 0.7rem;
            font-weight: bold;
            padding: 3px 12px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .store-logo {
            width: 55px;
            height: 55px;
            background: linear-gradient(145deg, #d4af37, #b8860b);
            border-radius: 50%;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            color: white;
            font-size: 1rem;
            box-shadow: 3px 3px 6px rgba(0,0,0,0.1);
        }

        .store-info { flex-grow: 1; }
        .store-name-link { 
            font-weight: 700; 
            color: var(--main-blue); 
            font-size: 1.1rem; 
            text-decoration: none;
            display: block;
        }
        .store-name-link:hover { color: var(--gold); }
        
        .product-name { font-size: 0.8rem; color: #6e8184; font-weight: 400; }

        .price-section { text-align: right; }
        .price-value { font-size: 1.5rem; font-weight: 800; color: var(--main-blue); }
        .currency { font-size: 0.9rem; color: var(--gold); font-weight: 800; margin-right: 2px; }

        .btn-refresh {
            display: block;
            text-align: center;
            background: var(--main-blue);
            color: white;
            text-decoration: none;
            padding: 18px;
            margin: 20px;
            border-radius: 15px;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 1px;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(10, 61, 68, 0.2);
        }

        .btn-refresh:active { transform: scale(0.98); }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>PRECIO AL DÍA</h1>
        <div class="subtitle">Bistec • Pulpa Negra • Chocozuela</div>
        <div class="date-badge" id="fecha">--/--/----</div>
    </header>
    
    <div id="lista">
        </div>

    <button class="btn-refresh" onclick="window.location.reload()">🔄 ACTUALIZAR PRECIOS</button>
</div>

<script>
    async function cargarPrecios() {
        try {
            const respuesta = await fetch('precios.json');
            let datos = await respuesta.json();
            const listaDiv = document.getElementById('lista');
            const fechaDiv = document.getElementById('fecha');
            
            datos.sort((a, b) => a.precio - b.precio);
            listaDiv.innerHTML = '';
            fechaDiv.innerText = "📅 " + new Date().toLocaleDateString();

            datos.forEach((tienda, index) => {
                const card = document.createElement('div');
                card.className = 'card ' + (index === 0 ? 'best-deal' : '');
                const iniciales = tienda.nombre.substring(0, 2).toUpperCase();

                card.innerHTML = `
                    <div class="store-logo" style="${index > 0 ? 'background: #cbd5d8; color: #5a6d70;' : ''}">${iniciales}</div>
                    <div class="store-info">
                        <a href="${tienda.link}" target="_blank" class="store-name-link">${tienda.nombre}</a>
                        <span class="product-name">Corte de Primera</span>
                    </div>
                    <div class="price-section">
                        <span class="currency">$</span><span class="price-value">${tienda.precio.toFixed(2)}</span>
                    </div>
                `;
                listaDiv.appendChild(card);
            });
        } catch (error) {
            document.getElementById('lista').innerHTML = "<p style='text-align:center'>Conectando con el mercado...</p>";
        }
    }
    cargarPrecios();
</script>
</body>
</html>
