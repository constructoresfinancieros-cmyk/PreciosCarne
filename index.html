<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Intelligence VZLA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #d32f2f;
            --success: #2e7d32;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            margin: 0; 
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .app-container { 
            width: 100%;
            max-width: 450px; /* Tamaño ideal para móvil/TikTok */
            background: var(--card-bg); 
            border-radius: 24px; 
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        header {
            background: linear-gradient(135deg, #d32f2f 0%, #b71c1c 100%);
            padding: 30px 20px;
            color: white;
            text-align: center;
        }

        h1 { margin: 0; font-size: 1.5rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .subtitle { font-size: 0.9rem; opacity: 0.9; margin-top: 5px; }

        .date-badge {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            margin-top: 15px;
        }

        #lista { padding: 15px; }

        .card {
            display: flex;
            align-items: center;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 16px;
            border: 1px solid #f0f0f0;
            transition: transform 0.2s;
        }

        /* Estilo para el más barato */
        .card.best-deal {
            border: 2px solid #4caf50;
            background: #f1f8e9;
            position: relative;
        }

        .best-deal::after {
            content: "Mejor Opción 🚀";
            position: absolute;
            top: -10px;
            right: 15px;
            background: #4caf50;
            color: white;
            font-size: 0.65rem;
            font-weight: bold;
            padding: 2px 10px;
            border-radius: 10px;
        }

        .store-logo {
            width: 50px;
            height: 50px;
            background: #eee;
            border-radius: 12px;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #999;
            font-size: 0.8rem;
        }

        .store-info { flex-grow: 1; }
        .store-name { font-weight: 700; color: #333; font-size: 1.05rem; display: block; }
        .product-name { font-size: 0.75rem; color: #777; }

        .price-section { text-align: right; }
        .price-value { font-size: 1.3rem; font-weight: 800; color: #222; }
        .currency { font-size: 0.8rem; color: #666; margin-right: 2px; }

        .btn-shop {
            display: block;
            text-align: center;
            background: #333;
            color: white;
            text-decoration: none;
            padding: 12px;
            margin: 15px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.9rem;
            transition: background 0.3s;
        }

        .btn-shop:hover { background: #000; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>🥩 COMPARADOR PRO</h1>
        <div class="subtitle">Bistec • Pulpa Negra • Chocozuela</div>
        <div class="date-badge" id="fecha">Actualizando datos...</div>
    </header>
    
    <div id="lista">
        </div>

    <a href="#" class="btn-shop" onclick="window.location.reload()">🔄 ACTUALIZAR PRECIOS</a>
</div>

<script>
    async function cargarPrecios() {
        try {
            const respuesta = await fetch('precios.json');
            let datos = await respuesta.json();
            const listaDiv = document.getElementById('lista');
            const fechaDiv = document.getElementById('fecha');
            
            datos.sort((a, b) => a.precio - b.precio);

            listaDiv.innerHTML = '';
            fechaDiv.innerText = "📅 " + new Date().toLocaleDateString();

            datos.forEach((tienda, index) => {
                const card = document.createElement('div');
                card.className = 'card ' + (index === 0 ? 'best-deal' : '');
                
                // Iniciales para el logo temporal
                const iniciales = tienda.nombre.substring(0, 2).toUpperCase();

                card.innerHTML = `
                    <div class="store-logo">${iniciales}</div>
                    <div class="store-info">
                        <span class="store-name">${tienda.nombre}</span>
                        <span class="product-name">Corte de Primera</span>
                    </div>
                    <div class="price-section">
                        <span class="currency">$</span><span class="price-value">${tienda.precio.toFixed(2)}</span>
                    </div>
                `;
                listaDiv.appendChild(card);
            });
        } catch (error) {
            document.getElementById('lista').innerHTML = "<p style='text-align:center'>Obteniendo precios del mercado...</p>";
        }
    }
    cargarPrecios();
</script>
</body>
</html>
